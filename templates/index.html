<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="stylesheet" href="{{ url_for('static', filename='/styles/style.css') }}">

	<style>
		body {
	font-family: 'Arial', sans-serif;
	background-color: #f4f4f4;
	margin: 0;
	padding: 0;
	display: flex;
	align-items: center;
	justify-content: center;
	height: 100vh;
}

.chatbot-container {
	max-width: 400px;
	width: 100%;
	box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
	background-color: #fff;
	border-radius: 8px;
	overflow: hidden;
}

.chat {
	padding: 20px;
	overflow-y: auto;
	max-height: 300px;
}

.user-message {
	background-color: #e0f7fa;
	color: #000;
	text-align: right;
	padding: 10px;
	margin-bottom: 10px;
	border-radius: 8px;
}

.bot-message {
	background-color: #c8e6c9;
	color: #000;
	text-align: left;
	padding: 10px;
	margin-bottom: 10px;
	border-radius: 8px;
}

.input-container {
	display: flex;
	flex-direction: column;
	padding: 10px;
	background-color: #f2f2f2;
}

.selected-symptoms {
	display: flex;
	flex-wrap: wrap;
	margin-bottom: 10px;
}

.available-symptoms {
	display: flex;
	flex-wrap: wrap;
	margin-bottom: 10px;
}

.symptom-button {
	background-color: #4CAF50;
	color: white;
	border: none;
	padding: 8px 15px;
	border-radius: 4px;
	cursor: pointer;
	margin: 5px;
	outline: none;
}

.input-container button {
	background-color: #4CAF50;
	color: white;
	border: none;
	padding: 8px 15px;
	border-radius: 4px;
	cursor: pointer;
	margin-top: 5px;
	outline: none;
}
	</style>

</head>

<body>

	<div class="chatbot-container">
		<div class="chat" id="chat">
			<div class="bot-message">Hello! Please select your gender.</div>
		</div>

		<div class="input-container">
			<div class="selected-symptoms" id="selectedSymptoms"></div>
			<!-- <button class="symptom-button" onclick="sendMessage()">Send</button> -->
			<div class="available-symptoms" id="availableSymptoms">

				<button class="symptom-button" id="male" onclick="askSymptom('male')">Male</button>
				<button class="symptom-button" id="female" onclick="askSymptom('female')">Female</button>

			
			</div>
		</div>

	</div>

<!-- 	<script src="{{ url_for('static', filename='/scripts/script.js') }}"></script> -->

</body>

</html>
